spring:
  application:
    name: remediar-api
  datasource:
    url: jdbc:h2:mem:remediar;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

remediar:
  security:
    jwt:
      secret: ${REMEDIAR_JWT_SECRET:dev-remediar-secret-change-me-please-32-bytes}
      access-token-ttl: PT8H
  match:
    default-radius-km: 10
  donation:
    delivery-business-days: 5

server:
  port: 8081
