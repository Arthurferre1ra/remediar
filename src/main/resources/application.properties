spring.application.name=remediar-api
spring.application.name=remediar-api

spring.datasource.url=jdbc:h2:mem:remediar;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

remediar.match.default-radius-km=10
remediar.donation.delivery-business-days=5
